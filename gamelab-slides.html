<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מצגת מדריך — PlayCode Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--cyan:#67e8f9;--pink:#f0abfc;--dark:#08111f;--paper:rgba(255,255,255,.96)}*{box-sizing:border-box}body{margin:0;font-family:Rubik,Arial,sans-serif;direction:rtl;color:#0f172a;background:linear-gradient(135deg,#08111f,#312e81 56%,#701a75);min-height:100vh;overflow:hidden}.deck{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;padding:30px}.slide{display:none;width:min(1100px,100%);min-height:min(680px,calc(100vh - 120px));background:var(--paper);border-radius:34px;padding:42px;box-shadow:0 28px 80px rgba(0,0,0,.32);position:relative;overflow:auto}.slide.active{display:flex;flex-direction:column;justify-content:center}.kicker{font-weight:900;color:#7c3aed;margin-bottom:10px}.emoji{font-size:5.2rem;margin-bottom:12px}h1{font-size:clamp(2.4rem,6vw,4.7rem);line-height:1.05;margin:0 0 16px}h2{font-size:clamp(2rem,5vw,3.55rem);line-height:1.1;margin:0 0 20px}p,li{font-size:clamp(1.08rem,1.8vw,1.48rem);line-height:1.58}.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.card{background:#f8fafc;border-radius:18px;padding:16px;border-right:7px solid #8b5cf6}.card b{display:block;color:#7c3aed;margin-bottom:6px}.flow{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.flow .card{font-size:.95rem}.blocks{display:grid;gap:8px;margin-top:12px}.block{width:max-content;max-width:95%;background:#4c97ff;color:white;border-radius:14px;padding:11px 18px;font-weight:900;font-size:clamp(1rem,1.65vw,1.22rem);box-shadow:0 5px 0 rgba(0,0,0,.16);margin:0 0 2px auto}.block.event{background:#ffab19;color:#263238}.block.condition{background:#ff8c1a;color:#263238}.block.game{background:#40bf4a}.block.ai{background:#a855f7}.solution{background:#f8fafc;border:3px dashed #c4b5fd;border-radius:20px;padding:14px;margin-top:12px;max-height:330px;overflow:auto}.note{background:#fff7ed;border-right:7px solid #fb923c;border-radius:18px;padding:14px;margin-top:12px}.nav{position:fixed;inset:auto 24px 24px 24px;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;color:white;font-weight:900;pointer-events:none}.nav>*{pointer-events:auto}.nav-actions{display:flex;gap:10px}button,.back{border:0;border-radius:999px;background:white;color:#7c3aed;padding:12px 18px;font-weight:900;text-decoration:none;cursor:pointer;box-shadow:0 8px 28px rgba(0,0,0,.12)}.counter{background:rgba(0,0,0,.25);padding:10px 16px;border-radius:999px;justify-self:center}@media(max-width:760px){body{overflow:auto}.deck{height:auto;min-height:100svh;padding:12px 10px 88px}.slide{min-height:calc(100svh - 105px);padding:22px 16px;border-radius:22px}.slide.active{justify-content:flex-start}.emoji{font-size:3.5rem}h1{font-size:2.1rem}h2{font-size:1.7rem}.cards,.flow{grid-template-columns:1fr}p,li{font-size:1.02rem}.nav{position:fixed;inset:auto 10px 10px 10px;display:flex;justify-content:space-between;background:rgba(8,17,31,.62);backdrop-filter:blur(12px);border-radius:999px;padding:8px}.counter{display:none}button,.back{padding:9px 10px;font-size:.84rem}.nav-actions{gap:5px}.solution{max-height:none}.block{width:100%;font-size:.94rem}}
  </style>
</head>
<body>
  <main class="deck" id="deck"></main>
  <nav class="nav">
    <button onclick="prevSlide()">→ הקודם</button>
    <span class="counter" id="counter"></span>
    <div class="nav-actions"><button onclick="nextSlide()">הבא ←</button><a class="back" id="playLink" href="gamelab-play.html">🧩 לתרגול</a><a class="back" href="gamelab.html">🎮 למסלול</a></div>
  </nav>
  <script src="js/gamelab-lessons.js?v=20260717-90"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const lesson = window.getGameLabLesson(params.get('lesson'));
    const labels = window.GAMELAB_BLOCK_LABELS;
    let current = 0;
    const esc = v => String(v || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    document.title = `מצגת מדריך — שיעור ${lesson.id}: ${lesson.title}`;
    document.getElementById('playLink').href = `gamelab-play.html?lesson=${lesson.id}`;
    function cls(text){ if(/כאשר/.test(text)) return 'event'; if(/אם|תנאי/.test(text)) return 'condition'; if(/AI|במאי|אתגר/.test(text)) return 'ai'; return 'game'; }
    function renderBlocks(blocks){ return `<div class="solution"><div class="kicker">פתרון/כיוון בבלוקים</div><div class="blocks">${(blocks||[]).map(b=>`<div class="block ${cls(b)}">${esc(b)}</div>`).join('')}</div></div>`; }
    const flowSlides = (lesson.lessonFlow || []).map(step => ({ html:`<div class="kicker">מהלך שיעור 90 דקות</div><h2>${esc(step.minutes)} — ${esc(step.title)}</h2><div class="cards"><div class="card"><b>מה המדריך עושה</b>${esc(step.teacher)}</div><div class="card"><b>מה הילדים עושים</b>${esc(step.students)}</div></div>` }));
    const exerciseSlides = (lesson.exercises || []).flatMap((ex, i) => [
      { html:`<div class="kicker">${esc(ex.minutes)} • משימת פיתוח ${i+1}</div><h2>${esc(ex.title)}</h2><p>${esc(ex.prompt)}</p><div class="note"><b>שאלת בדיקה למדריך:</b> האם הילד יכול להסביר איזה אירוע מפעיל את הקוד ומה משתנה במשחק?</div>` },
      { html:`<div class="kicker">פתרון/הכוונה למדריך • משימה ${i+1}</div><h2>${esc(ex.title)}</h2>${renderBlocks(ex.blocks)}<p><b>תוצאה רצויה:</b> ${esc(lesson.outcome)}</p>` }
    ]);
    const slides = [
      { html:`<div class="emoji">🎮</div><div class="kicker">PlayCode Lab • שיעור ${lesson.id} • ${lesson.durationMinutes} דקות</div><h1>${esc(lesson.title)}</h1><p>${esc(lesson.story)}</p>` },
      { html:`<h2>🎯 מטרת השיעור</h2><p>${esc(lesson.mission)}</p><div class="cards"><div class="card"><b>מושג פיתוח משחקים</b>${esc(lesson.concept)}</div><div class="card"><b>תוצר בסוף השיעור</b>${esc(lesson.outcome)}</div></div>` },
      { html:`<h2>🧩 בלוקים מרכזיים</h2><div class="cards">${lesson.blocks.map(b=>`<div class="card"><b>${esc(labels[b]||b)}</b>${esc(b)}</div>`).join('')}</div>` },
      { html:`<h2>🤖 במאי המשחק החכם</h2><p>${esc(lesson.aiChallenge)}</p><div class="note"><b>חשוב:</b> ה־AI לא בונה במקום הילדים. הוא נותן רעיון, והילדים בוחרים איך להפוך אותו לחוק משחק ב־Blockly.</div>` },
      ...flowSlides,
      { html:`<h2>🧪 רצף משימות ל־90 דקות</h2><ul>${lesson.exercises.map(ex=>`<li><b>${esc(ex.minutes)}:</b> ${esc(ex.title)}</li>`).join('')}</ul>` },
      ...exerciseSlides,
      { html:`<h2>🏁 סיכום שיעור</h2><p><b>משפט סיום לילדים:</b> “היום בניתי משחק שבו הדמות שלי ___, המטרה היא ___, והקוד הכי חשוב הוא ___.”</p><div class="note">${esc(lesson.directorTip)}</div>` }
    ];
    document.getElementById('deck').innerHTML = slides.map((s,i)=>`<section class="slide ${i===0?'active':''}">${s.html}</section>`).join('');
    function render(){ document.querySelectorAll('.slide').forEach((s,i)=>s.classList.toggle('active',i===current)); document.getElementById('counter').textContent = `${current+1} / ${slides.length}`; }
    function nextSlide(){ current=Math.min(current+1,slides.length-1); render(); }
    function prevSlide(){ current=Math.max(current-1,0); render(); }
    document.addEventListener('keydown', e => { if(e.key==='ArrowLeft'||e.key===' ') nextSlide(); if(e.key==='ArrowRight') prevSlide(); });
    render();
  </script>
  <script src="/js/feedback-widget.js?v=20260711-feedback"></script>
</body>
</html>
