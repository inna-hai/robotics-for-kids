<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">🎡 סיסי בלונה פארק</title>
  <meta name="description" content="משחק שיעור 11: בוחרים מתקן והגדרה מתאימה — פקודה עם ערך." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/park.css?v=20260717-park-1">
</head>
<body>
  <main class="shell">
    <header class="play-header">
      <div><div class="kicker" id="page-subtitle">שיעור 11 • פקודה עם הגדרה</div><h1>🎡 סיסי בלונה פארק</h1></div>
      <nav class="lesson-nav" id="lesson-nav" aria-label="מעבר בין מתקני הלונה פארק"></nav>
    </header>

    <section class="ride-card">
      <div class="big-emoji" id="lesson-emoji" aria-hidden="true">🎡</div>
      <div><h2 id="lesson-heading">מתקן בלונה פארק</h2><p id="story"></p><span class="goal-chip" id="goal-chip"></span><div class="learning-note" id="learning-note"></div></div>
    </section>

    <section class="park-layout">
      <div class="option-panel">
        <h2>1. איזה מתקן מפעילים?</h2>
        <p>בחרו את המתקן שמתאים לסיפור.</p>
        <div class="option-grid" id="control-options"></div>
      </div>
      <div class="option-panel">
        <h2>2. באיזו הגדרה?</h2>
        <p>בחרו עוצמה או מהירות שמתאימה לילדים.</p>
        <div class="option-grid" id="setting-options"></div>
      </div>
    </section>

    <section class="command-panel">
      <h2>הפקודה שבניתי</h2>
      <div class="command-preview" id="command-preview" aria-live="polite"></div>
      <div class="ride-stage" id="ride-stage" aria-label="תצוגת המתקן"></div>
      <div class="controls">
        <button class="btn" id="check" type="button">▶️ להפעיל מתקן</button>
        <button class="btn secondary" id="hint" type="button">💡 רמז</button>
        <button class="btn secondary" id="clear" type="button">🔄 להתחיל מחדש</button>
        <a class="btn secondary" href="park.html">🎡 עמוד השיעור</a>
      </div>
      <div class="result" id="result" aria-live="polite"></div>
      <div class="next-step" id="next-step"></div>
    </section>
  </main>
  <script src="js/park-lessons.js?v=20260717-park-1"></script>
  <script src="js/course-certificate.js?v=20260717-cert-1"></script>
  <script src="js/park-play.js?v=20260717-park-lab-1"></script>
  <script src="/js/feedback-widget.js?v=20260714-mobile-offset"></script>
</body>
</html>
