<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebMakers Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}:root{--preview-width:430px;--ink:#0f172a;--cyan:#67e8f9;--purple:#7c3aed;--orange:#f97316}body{margin:0;height:100vh;overflow:hidden;font-family:Rubik,Arial,sans-serif;direction:rtl;background:radial-gradient(circle at 12% 0,rgba(103,232,249,.22),transparent 30%),linear-gradient(135deg,#07111f,#172554 55%,#581c87);color:var(--ink);display:flex;flex-direction:column}.topbar{background:rgba(255,255,255,.97);padding:.7rem 1rem;display:grid;grid-template-columns:auto 1fr auto;gap:1rem;align-items:center;box-shadow:0 6px 24px rgba(0,0,0,.2);z-index:5}.brand{font-weight:900;white-space:nowrap}.title{text-align:center;font-weight:900;color:#1d4ed8}.actions{display:flex;gap:.45rem;flex-wrap:wrap}.btn{border:0;border-radius:999px;padding:.62rem .95rem;font-family:inherit;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:.28rem}.run{background:#22c55e;color:#052e16}.check{background:#facc15;color:#422006}.reset{background:#fb7185;color:white}.link{background:#eef2ff;color:#3730a3}.main{flex:1;min-height:0;display:grid;grid-template-columns:330px minmax(0,1fr) var(--preview-width);gap:1rem;padding:1rem}.panel{background:rgba(255,255,255,.96);border-radius:24px;box-shadow:0 18px 48px rgba(0,0,0,.2);min-height:0;overflow:hidden;display:flex;flex-direction:column}.info{padding:1rem;border-bottom:1px solid #e5e7eb;overflow:auto}.info h1{font-size:1.25rem;margin:.2rem 0}.info p{line-height:1.55}.chip{display:inline-flex;background:#f5f3ff;color:#6d28d9;border-radius:999px;padding:.35rem .65rem;font-weight:900;font-size:.78rem;margin:.12rem}.guide-box{margin-top:.75rem;background:linear-gradient(135deg,#ecfeff,#fff7ed);border:2px solid #bae6fd;border-radius:18px;padding:.75rem}.guide-box b{color:#1d4ed8}.guide-steps{margin:.45rem 0 0;padding:0 1.1rem;color:#334155}.exercise-list{overflow:auto;padding:1rem;display:grid;gap:.65rem}.exercise{background:#f8fafc;border:2px solid #e5e7eb;border-radius:18px;padding:.75rem;line-height:1.45;cursor:pointer}.exercise.active{border-color:#7c3aed;background:#f5f3ff}.exercise.done{border-color:#22c55e;background:#f0fdf4}.exercise b{display:block;color:#1d4ed8}.hint{font-size:.88rem;color:#64748b}.editor-panel{background:linear-gradient(135deg,#eef2ff,#ecfeff)}.coach{padding:.85rem;background:linear-gradient(135deg,#fff7ed,#eef2ff);border-bottom:1px solid #c7d2fe}.coach h2{font-size:1rem;margin:.1rem 0 .45rem;color:#6d28d9}.code-cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.5rem}.code-card{border:0;border-radius:16px;background:white;padding:.65rem;text-align:right;font-family:inherit;font-weight:900;cursor:pointer;box-shadow:0 5px 0 rgba(15,23,42,.08);border-right:6px solid var(--cyan)}.code-card small{display:block;color:#475569;font-weight:700;line-height:1.35;margin-top:.2rem}.code-card:hover{transform:translateY(-2px);border-right-color:var(--orange)}.tabs{display:flex;background:#0f172a;padding:.45rem;gap:.4rem}.tabs button{flex:1;border:0;border-radius:12px;padding:.6rem;font-weight:900;cursor:pointer;background:#334155;color:white}.tabs button.active{background:#67e8f9;color:#07111f}.editor{flex:1;min-height:0;display:none}.editor.active{display:block}textarea{width:100%;height:100%;min-height:0;resize:none;border:0;outline:0;padding:1rem;font:600 15px/1.55 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;direction:ltr;text-align:left;background:#07111f;color:#e5f3ff}.preview-panel{position:relative}.preview-resize{position:absolute;top:0;right:-.65rem;bottom:0;width:1.3rem;z-index:4;cursor:col-resize;display:flex;align-items:center;justify-content:center;touch-action:none}.preview-resize:before{content:"";width:7px;height:82px;border-radius:999px;background:linear-gradient(180deg,#67e8f9,#c084fc);box-shadow:0 0 0 4px rgba(255,255,255,.9)}.preview-head{padding:.8rem 1rem;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;font-weight:900}.preview-wrap{flex:1;min-height:0;background:white}iframe{width:100%;height:100%;border:0;background:white}.feedback{padding:.8rem 1rem;border-top:1px solid #e5e7eb;font-weight:900;line-height:1.45}.good{color:#15803d}.bad{color:#b91c1c}.focus-flash{animation:flash 1.1s ease}@keyframes flash{0%{box-shadow:0 0 0 0 #67e8f9}50%{box-shadow:0 0 0 5px #67e8f966}100%{box-shadow:none}}@media(max-width:1100px){body{height:auto;min-height:100vh;overflow:auto}.topbar{grid-template-columns:1fr}.title{text-align:right}.main{display:flex;flex-direction:column}.panel{min-height:430px}.preview-resize{display:none}.actions .btn{flex:1}.code-cards{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">🌐 WebMakers</div>
    <div class="title" id="topTitle"></div>
    <div class="actions">
      <button class="btn run" onclick="runCode()">▶️ הרצה</button>
      <button class="btn check" onclick="checkExercise()">✅ בדיקה</button>
      <button class="btn reset" onclick="resetCode()">↺ איפוס</button>
      <a class="btn link" id="slidesLink">מצגת</a>
      <a class="btn link" href="appforge.html">כל השיעורים</a>
    </div>
  </header>

  <main class="main">
    <section class="panel">
      <div class="info">
        <span class="chip" id="unitChip"></span>
        <span class="chip" id="conceptChip"></span>
        <h1 id="title"></h1>
        <p id="story"></p>
        <p><b>משימה:</b> <span id="mission"></span></p>
        <div class="guide-box">
          <b>איך עובדים בשיעור?</b>
          <ol class="guide-steps">
            <li>מריצים ורואים מוצר עובד.</li>
            <li>משנים דבר קטן ואישי.</li>
            <li>לוחצים על כרטיס קוד כדי למצוא את השורה החשובה.</li>
            <li>בודקים, מתקנים, ואז מציגים Demo.</li>
          </ol>
        </div>
      </div>
      <div class="exercise-list" id="exercises"></div>
    </section>

    <section class="panel editor-panel">
      <div class="coach">
        <h2>🧩 כרטיסי קוד — לא מתחילים מדף ריק</h2>
        <div class="code-cards" id="codeCards"></div>
      </div>
      <div class="tabs">
        <button class="active" onclick="showTab('html',this)">HTML</button>
        <button onclick="showTab('css',this)">CSS</button>
        <button onclick="showTab('js',this)">JavaScript</button>
      </div>
      <div class="editor active" id="tab-html"><textarea id="htmlCode" spellcheck="false"></textarea></div>
      <div class="editor" id="tab-css"><textarea id="cssCode" spellcheck="false"></textarea></div>
      <div class="editor" id="tab-js"><textarea id="jsCode" spellcheck="false"></textarea></div>
    </section>

    <section class="panel preview-panel" id="previewPanel">
      <div class="preview-resize" id="previewResize" aria-label="גרירה להרחבת התצוגה"></div>
      <div class="preview-head"><span>👀 תוצר חי</span><span id="progress">0/0</span></div>
      <div class="preview-wrap"><iframe id="preview" sandbox="allow-scripts"></iframe></div>
      <div class="feedback" id="feedback">הריצו את האפליקציה.</div>
    </section>
  </main>

  <script src="js/appforge-lessons.js?v=20260718-webmakers-scaffold"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const lesson = window.getWebMakersLesson(params.get('lesson'));
    let activeExercise = 1;
    const done = new Set();
    const $ = id => document.getElementById(id);
    const esc = v => String(v || '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));

    function init(){
      document.title = `WebMakers — שיעור ${lesson.id}: ${lesson.title}`;
      $('topTitle').textContent = `שיעור ${lesson.id}: ${lesson.title}`;
      $('unitChip').textContent = lesson.unit;
      $('conceptChip').textContent = lesson.concept;
      $('title').textContent = lesson.title;
      $('story').textContent = lesson.story;
      $('mission').textContent = lesson.mission;
      $('slidesLink').href = `appforge-slides.html?lesson=${lesson.id}`;
      resetEditors(false);
      $('exercises').innerHTML = lesson.exercises.map(ex => `<article class="exercise" id="ex-${ex.id}" onclick="selectExercise(${ex.id})"><b>${esc(ex.title)}</b><span>${esc(ex.minutes)}</span><p>${esc(ex.prompt)}</p><div class="hint">💡 ${esc(ex.hint)}</div></article>`).join('');
      renderCodeCards();
      initResize();
      selectExercise(1);
      runCode();
      renderProgress();
    }

    function resetEditors(run = true){
      $('htmlCode').value = lesson.starter.html;
      $('cssCode').value = lesson.starter.css;
      $('jsCode').value = lesson.starter.js;
      if(run) runCode();
    }

    function defaultCodeCards(){
      const cards = [];
      if((lesson.keywords || [])[0]) cards.push({ label:'🔎 מילת מפתח', tab:'js', snippet: lesson.keywords[0], hint:`מצאו איפה ${lesson.keywords[0]} מופיע בקוד.` });
      if((lesson.keywords || [])[1]) cards.push({ label:'⚙️ הפעולה המרכזית', tab:'js', snippet: lesson.keywords[1], hint:`זו הפעולה/הרעיון השני של השיעור.` });
      cards.push({ label:'👆 כפתור במסך', tab:'html', snippet:'onclick', hint:'הכפתור שמפעיל JavaScript.' });
      cards.push({ label:'🎨 עיצוב התוצר', tab:'css', snippet:'background', hint:'כאן מתחילה תחושת המוצר.' });
      return cards;
    }

    function renderCodeCards(){
      const cards = lesson.codeCards || defaultCodeCards();
      $('codeCards').innerHTML = cards.map((card, index) => `<button class="code-card" onclick="focusSnippet(${index})">${esc(card.label)}<small>${esc(card.hint)}</small></button>`).join('');
    }

    function focusSnippet(index){
      const card = (lesson.codeCards || defaultCodeCards())[index];
      if(!card) return;
      const tab = card.tab || 'js';
      showTab(tab);
      const editor = $(`${tab}Code`);
      const text = editor.value;
      const start = text.indexOf(card.snippet || '');
      editor.focus();
      if(start >= 0){
        editor.setSelectionRange(start, start + card.snippet.length);
        editor.classList.remove('focus-flash');
        void editor.offsetWidth;
        editor.classList.add('focus-flash');
        $('feedback').className = 'feedback good';
        $('feedback').textContent = `מצאתי בקוד: ${card.label}. עכשיו אפשר לשנות בזהירות רק ערך קטן.`;
      } else {
        $('feedback').className = 'feedback bad';
        $('feedback').textContent = 'לא מצאתי את הכרטיס הזה בקוד. אולי כבר שיניתם אותו?';
      }
    }

    function showTab(name, btn){
      document.querySelectorAll('.editor').forEach(e => e.classList.remove('active'));
      document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
      $(`tab-${name}`).classList.add('active');
      const buttons = [...document.querySelectorAll('.tabs button')];
      const index = { html:0, css:1, js:2 }[name] || 0;
      (btn || buttons[index])?.classList.add('active');
    }

    function selectExercise(id){
      activeExercise = id;
      document.querySelectorAll('.exercise').forEach(e => e.classList.remove('active'));
      $(`ex-${id}`)?.classList.add('active');
    }

    function safeScript(code){ return code.replace(/<\/script/gi, '<\\/script'); }

    function runCode(){
      try{
        new Function($('jsCode').value);
        const src = `<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><style>${$('cssCode').value}</style></head><body>${$('htmlCode').value}<script>${safeScript($('jsCode').value)}<\/script></body></html>`;
        $('preview').srcdoc = src;
        $('feedback').className = 'feedback good';
        $('feedback').textContent = 'האפליקציה רצה. עכשיו נסו שינוי קטן או בדיקה.';
      } catch(e){
        $('feedback').className = 'feedback bad';
        $('feedback').textContent = `שגיאת JavaScript: ${e.message}. בדקו מרכאות, סוגריים ושמות.`;
      }
    }

    function includesAll(text, list){ return (list || []).every(x => text.includes(x)); }

    function checkExercise(){
      const ex = lesson.exercises.find(e => e.id === activeExercise);
      const c = ex.check || {};
      runCode();
      const ok = includesAll($('htmlCode').value, c.htmlIncludes) && includesAll($('cssCode').value, c.cssIncludes) && includesAll($('jsCode').value, c.jsIncludes);
      if(ok){
        done.add(ex.id);
        $(`ex-${ex.id}`)?.classList.add('done');
        $('feedback').className = 'feedback good';
        $('feedback').textContent = `מעולה ✅ ${ex.title} הושלם. אפשר להמשיך או לשדרג.`;
        if(activeExercise < lesson.exercises.length) selectExercise(activeExercise + 1);
      } else {
        $('feedback').className = 'feedback bad';
        $('feedback').textContent = `כמעט. רמז: ${ex.hint}`;
      }
      renderProgress();
    }

    function resetCode(){
      if(!confirm('לאפס את השיעור?')) return;
      resetEditors(true);
      done.clear();
      selectExercise(1);
      renderProgress();
    }

    function renderProgress(){ $('progress').textContent = `${done.size}/${lesson.exercises.length}`; }

    function initResize(){
      const h = $('previewResize'), p = $('previewPanel');
      if(!h) return;
      let sx = 0, sw = 0;
      const set = w => document.documentElement.style.setProperty('--preview-width', `${Math.max(330, Math.min(850, parseFloat(w) || 430))}px`);
      set(localStorage.getItem('webmakersPreviewWidth') || 430);
      h.addEventListener('pointerdown', e => {
        if(matchMedia('(max-width:1100px)').matches) return;
        e.preventDefault(); sx = e.clientX; sw = p.getBoundingClientRect().width; document.body.style.cursor = 'col-resize';
        const move = ev => set(sw + ev.clientX - sx);
        const up = () => { document.body.style.cursor = ''; localStorage.setItem('webmakersPreviewWidth', getComputedStyle(document.documentElement).getPropertyValue('--preview-width')); removeEventListener('pointermove', move); removeEventListener('pointerup', up); };
        addEventListener('pointermove', move); addEventListener('pointerup', up);
      });
    }

    init();
  </script>
  <script src="/js/feedback-widget.js?v=20260711-feedback"></script>
</body>
</html>
