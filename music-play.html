<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 משחקים עם סיסי ומכונת המוזיקה</title>
  <meta name="description" content="משחק מוזיקה אינטראקטיבי לכיתות ב׳: בונים רצפי צלילים, מזהים דפוסים ולומדים חזרות." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/music.css?v=20260717-music-1">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <div class="kicker">שיעור 2 • מוזיקה ודפוסים • מכניקה חדשה</div>
        <h1 id="page-title">🎵 טוען משימה...</h1>
        <p id="page-subtitle">בנו רצף צלילים לפי הדפוס. הסדר חשוב — ממש כמו בקוד.</p>
        <div class="actions">
          <a class="btn secondary" href="music.html">🎶 כל משימות המוזיקה</a>
          <a class="btn secondary" href="space.html">🚀 שיעור 1: חלל</a>
        </div>
      </div>
      <div class="hero-art" aria-hidden="true">🤖🎹</div>
    </section>

    <section class="music-stage">
      <div class="lesson-title">
        <div>
          <h2 id="lesson-heading"></h2>
          <div class="mission" id="mission"></div>
        </div>
        <div class="emoji" id="lesson-emoji"></div>
      </div>

      <div class="teacher-note" id="teacher-fact"></div>

      <div class="challenge-box">
        <b>הדפוס שסיסי צריכה לבנות:</b>
        <div class="pattern-target" id="target"></div>
      </div>

      <h3>בחרו צלילים</h3>
      <div class="notes-bank" id="notes-bank" aria-label="בנק צלילים לבחירה"></div>

      <h3>הרצף שלי</h3>
      <div class="pattern-build" id="build" aria-live="polite"></div>

      <section class="thinking-box" aria-label="אתגר חשיבה מוזיקלי">
        <h3>🧠 אתגר חשיבה</h3>
        <p id="thinking-question"></p>
        <div class="thinking-options" id="thinking-options"></div>
      </section>

      <div class="music-controls">
        <button class="btn" id="play">▶️ השמעה</button>
        <button class="btn" id="check">✅ בדיקה</button>
        <button class="btn secondary" id="undo">↩️ מחיקה</button>
        <button class="btn secondary" id="clear">🧹 ניקוי</button>
        <button class="btn secondary" id="demo">💡 הצג דפוס</button>
      </div>

      <p class="result" id="result" aria-live="polite"></p>
      <h3>מעבר משימה</h3>
      <div class="lesson-selector" id="lesson-nav"></div>
    </section>
  </main>

  <script src="js/music-lessons.js?v=20260717-music-1"></script>
  <script src="js/course-certificate.js?v=20260717-cert-1"></script>
  <script src="js/music-play.js?v=20260717-music-1"></script>
  <script src="/js/feedback-widget.js?v=20260714-mobile-offset"></script>
</body>
</html>
