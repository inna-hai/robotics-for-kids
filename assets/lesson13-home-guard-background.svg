  <rect x="0" y="520" width="1200" height="240" fill="url(#yard)"/>
  <path d="M0 620 C210 570 330 670 520 610 C720 548 875 656 1200 590 L1200 760 L0 760 Z" fill="#064e3b" opacity="0.75"/>

