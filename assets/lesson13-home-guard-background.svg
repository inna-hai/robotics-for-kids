<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="בית פרטי בלילה מוקף גדר עם שער">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#06112f"/>
      <stop offset="0.55" stop-color="#172554"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="yard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14532d"/>
      <stop offset="1" stop-color="#052e16"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="url(#sky)"/>
  <circle cx="160" cy="105" r="44" fill="#fef3c7" filter="url(#softGlow)"/>
  <circle cx="180" cy="95" r="44" fill="#06112f" opacity="0.95"/>

