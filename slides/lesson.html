<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מצגת שיעור - סנסי בעיר החכמה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --purple:#6c5ce7; --blue:#00b4d8; --green:#00b894; --yellow:#fdcb6e; --dark:#2d3436; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:'Rubik',Arial,sans-serif; direction:rtl; background:linear-gradient(135deg,#6c5ce7,#00b4d8); color:var(--dark); min-height:100vh; overflow:hidden; }
    .deck { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; padding:30px; }
    .slide { display:none; width:min(1050px,100%); min-height:min(650px,calc(100vh - 120px)); background:rgba(255,255,255,.96); border-radius:32px; padding:42px; box-shadow:0 25px 70px rgba(0,0,0,.24); position:relative; }
    .slide.active { display:flex; flex-direction:column; justify-content:center; }
    .kicker { color:var(--purple); font-weight:900; margin-bottom:12px; }
    h1 { font-size:clamp(2.4rem,6vw,5rem); margin:0 0 18px; }
    h2 { font-size:clamp(2rem,5vw,4rem); margin:0 0 24px; }
    p, li { font-size:clamp(1.25rem,2.4vw,2rem); line-height:1.65; }
    ul { margin:0; padding-right:1.5em; }
    .emoji { font-size:6rem; margin-bottom:14px; }
    .cards { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-top:20px; }
    .card { background:#f7f9fc; border-radius:22px; padding:22px; font-size:1.3rem; font-weight:800; }
    .nav { position:fixed; inset:auto 24px 24px 24px; display:flex; justify-content:space-between; align-items:center; color:white; font-weight:900; }
    button, .back { border:0; border-radius:999px; background:white; color:var(--purple); padding:12px 18px; font-weight:900; text-decoration:none; cursor:pointer; }
    .counter { background:rgba(0,0,0,.22); padding:10px 16px; border-radius:999px; }
    @media (max-width:700px){ body{overflow:auto}.deck{height:auto;min-height:100vh}.slide{padding:26px;min-height:calc(100vh - 110px)}.cards{grid-template-columns:1fr}.nav{position:sticky;bottom:0;padding:10px 0}.emoji{font-size:4rem} }
  </style>
</head>
<body>
  <main class="deck" id="deck"></main>
  <nav class="nav">
    <button onclick="prevSlide()">→ הקודם</button>
    <span class="counter" id="counter"></span>
    <button onclick="nextSlide()">הבא ←</button>
    <a class="back" id="backToLesson" href="../smart-city.html">🏙️ לעיר</a>
  </nav>

  <script src="../js/lessons-data.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const lesson = window.getSensiLesson(params.get('id'));
    let current = 0;

    document.title = `${lesson.emoji} שיעור ${lesson.id}: ${lesson.title}`;
    document.getElementById('backToLesson').href = `../index.html?lesson=${lesson.id}`;

    const slides = [
      { html: `<div class="emoji">${lesson.emoji}</div><div class="kicker">שיעור ${lesson.id} • ${lesson.cityZone}</div><h1>${lesson.title}</h1><p>${lesson.story}</p>` },
      { html: `<h2>🎯 מה נלמד היום?</h2><ul>${lesson.learningGoals.map(goal => `<li>${goal}</li>`).join('')}</ul>` },
      { html: `<h2>🤖 החיישן של היום</h2><p>היום סנסי משתמש ב<strong>חיישן ${lesson.sensorFocus}</strong>.</p><p>החיישן עוזר לרובוט להבין מה קורה סביבו — ואז לבחור פעולה.</p>` },
      { html: `<h2>🧩 רעיון תכנותי</h2><p><strong>${lesson.codingConcept}</strong></p><p>במקום לתת לרובוט הוראה אחת קבועה, אנחנו מלמדים אותו לבדוק מצב ולקבל החלטה.</p>` },
      { html: `<h2>🧱 בלוקים שנשתמש בהם</h2><div class="cards">${lesson.blocks.map(block => `<div class="card">${block}</div>`).join('')}</div>` },
      { html: `<h2>✅ המשימה שלכם</h2><ul>${lesson.studentTasks.map(task => `<li>${task}</li>`).join('')}</ul>` },
      { html: `<h2>💬 שאלת חשיבה</h2><p>${lesson.teacherNotes.discussionQuestions[0] || 'איפה עוד בעיר אפשר להשתמש ברעיון הזה?'}</p>` },
      { html: `<h2>🚀 עוברים לבנייה</h2><p>פתחו את הסימולטור, בנו את הבלוקים, בדקו, שפרו — ואז הסבירו לחבר איך סנסי חושב.</p>` }
    ];

    document.getElementById('deck').innerHTML = slides.map((slide, index) => `<section class="slide ${index === 0 ? 'active' : ''}">${slide.html}</section>`).join('');

    function render() {
      document.querySelectorAll('.slide').forEach((slide, index) => slide.classList.toggle('active', index === current));
      document.getElementById('counter').textContent = `${current + 1} / ${slides.length}`;
    }
    function nextSlide() { current = Math.min(current + 1, slides.length - 1); render(); }
    function prevSlide() { current = Math.max(current - 1, 0); render(); }
    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowLeft' || event.key === ' ') nextSlide();
      if (event.key === 'ArrowRight') prevSlide();
    });
    render();
  </script>
</body>
</html>
