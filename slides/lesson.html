<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מצגת שיעור - סנסי בעיר החכמה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --purple:#6c5ce7; --blue:#00b4d8; --green:#00b894; --yellow:#fdcb6e; --dark:#2d3436; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:'Rubik',Arial,sans-serif; direction:rtl; background:linear-gradient(135deg,#6c5ce7,#00b4d8); color:var(--dark); min-height:100vh; overflow:hidden; }
    /* slide-balanced-frame-v9 */
    .deck { width:100%; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px 24px 92px; }
    .slide { display:none; width:min(1180px, calc(100vw - 48px)); max-width:none; min-height:calc(100vh - 116px); max-height:calc(100vh - 116px); background:rgba(255,255,255,.98); border-radius:34px; padding:50px 58px; box-shadow:0 25px 70px rgba(0,0,0,.24); position:relative; overflow:hidden; }
    .slide.active { display:flex; flex-direction:column; justify-content:flex-start; }
    .slide-content { width:100%; min-height:calc(100vh - 222px); max-height:calc(100vh - 222px); overflow-y:auto; padding-left:10px; scrollbar-gutter:stable; display:flex; flex-direction:column; }
    .slide-content::-webkit-scrollbar { width:10px; }
    .slide-content::-webkit-scrollbar-track { background:rgba(108,92,231,.08); border-radius:999px; }
    .slide-content::-webkit-scrollbar-thumb { background:rgba(108,92,231,.38); border-radius:999px; border:2px solid rgba(255,255,255,.9); }
    .slide-content::-webkit-scrollbar-thumb:hover { background:rgba(108,92,231,.58); }
    /* slide-main-text-box-v6 */
    .slide-content > p {
      background:#f7f9fc;
      border-right:8px solid var(--purple);
      border-radius:28px;
      padding:78px 68px;
      min-height:calc(100vh - 398px);
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      box-shadow:0 16px 36px rgba(108,92,231,.16);
      margin:24px 0 0;
    }
    .kicker { color:var(--purple); font-weight:900; margin-bottom:12px; }
    h1 { font-size:clamp(2.4rem,6vw,5rem); margin:0 0 18px; }
    h2 { font-size:clamp(2rem,5vw,4rem); margin:0 0 24px; }
    p, li { font-size:clamp(1.15rem,2.1vw,1.75rem); line-height:1.55; }
    ul { margin:0; padding-right:1.5em; }
    .time-badge { display:inline-flex; background:var(--yellow); color:#5f4300; border-radius:999px; padding:8px 18px; font-weight:900; margin-bottom:16px; font-size:1.4rem; }
    /* slide-card-size-v2 */
    .teacher-box {
      background:#f7f9fc;
      border-right:8px solid var(--purple);
      border-radius:24px;
      padding:44px 42px;
      margin:24px 0;
      min-height:360px;
      max-height:calc(100vh - 300px);
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    .teacher-box h3 { margin:0 0 8px; color:var(--purple); font-size:1.35rem; }
    /* slide-panel-size-v6 */
    .two-cols { display:grid; grid-template-columns:1fr 1fr; gap:22px; align-items:stretch; }
    .two-cols .teacher-box { min-height:360px; }
    /* slide-block-overlap-fix-v23 */
    .code-blocks { display:grid; gap:16px; margin-top:18px; direction:rtl; align-content:start; }
    .blockly-solution {
      background:#f8fafc;
      border:3px dashed #dbe4ff;
      border-radius:24px;
      padding:44px 42px;
      margin:24px 0;
      min-height:360px;
      max-height:calc(100vh - 300px);
      overflow-y:auto;
    }
    .blockly-caption { color:var(--purple); font-weight:900; margin-bottom:10px; font-size:1.1rem; }
    .visual-block {
      --block-color:#9966ff;
      position:relative;
      display:block;
      width:max-content;
      max-width:92%;
      color:white;
      background:var(--block-color);
      border:3px solid rgba(0,0,0,.18);
      border-radius:14px 14px 14px 14px;
      padding:12px 20px 12px 18px;
      font-size:clamp(.95rem,1.45vw,1.18rem);
      font-weight:900;
      box-shadow:0 5px 0 rgba(0,0,0,.16), inset 0 2px 0 rgba(255,255,255,.18);
      margin:0 0 2px auto;
      text-shadow:0 1px 1px rgba(0,0,0,.18);
    }
    .visual-block::before {
      content:'';
      position:absolute;
      top:-8px;
      right:28px;
      width:34px;
      height:12px;
      border-radius:0 0 8px 8px;
      background:rgba(255,255,255,.34);
    }
    .visual-block::after { display:none; }
    .visual-block.event { --block-color:#ffab19; color:#263238; text-shadow:none; border-radius:26px 14px 14px 26px; }
    .visual-block.sensor { --block-color:#40bf4a; }
    .visual-block.control { --block-color:#ff8c1a; color:#263238; text-shadow:none; }
    .visual-block.motion { --block-color:#4c97ff; }
    .visual-block.action { --block-color:#9966ff; }
    .visual-block.sound { --block-color:#cf63cf; }
    .visual-block.stop { --block-color:#ff8c1a; color:#263238; text-shadow:none; }
    .visual-block.street-light { --block-color:#f59e0b; color:#263238; text-shadow:none; }
    .visual-block.say { --block-color:#9966ff; }
    .visual-block.nested { margin-right:54px; }
    .visual-block.if-block { min-width:420px; padding-bottom:16px; }
    .visual-block.if-block .condition-pill {
      display:inline-block;
      background:#40bf4a;
      color:white;
      border-radius:999px;
      padding:4px 12px;
      margin:0 6px;
      border:2px solid rgba(0,0,0,.18);
    }
    .visual-block.connector {
      width:20px;
      height:10px;
      padding:0;
      margin:-5px 76px -3px auto;
      border-radius:0;
      box-shadow:none;
      opacity:.55;
    }
    .visual-block.connector::before, .visual-block.connector::after { display:none; }
    .teacher-note {
      background:#fff7ed;
      border-right:8px solid #fb923c;
      border-radius:22px;
      padding:48px 40px;
      margin-top:24px;
      min-height:300px;
      display:flex;
      align-items:center;
      font-size:clamp(1rem,1.6vw,1.25rem);
      line-height:1.55;
    }
    .exercise-kind { display:inline-flex; align-items:center; gap:8px; background:#eef2ff; color:var(--purple); border-radius:999px; padding:8px 14px; font-weight:900; margin-bottom:12px; }
    .emoji { font-size:6rem; margin-bottom:14px; }
    .cards { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-top:20px; }
    .card {
      background:#f7f9fc;
      border-radius:24px;
      padding:56px 44px;
      min-height:360px;
      font-size:1.3rem;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      line-height:1.45;
    }
/* slide-nav-below-card-v9 */
.nav {
  position: fixed;
  inset: auto 24px 18px 24px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 14px;
  align-items: center;
  color: white;
  font-weight: 900;
  pointer-events: none;
  z-index: 100;
}
    /* .nav { position:fixed; inset:auto 24px 24px 24px; display:grid; grid-template-columns:auto 1fr auto; gap:14px; align-items:center; color:white; font-weight:900; pointer-events:none; } */
  .nav > * { pointer-events: auto; }
    /* .nav > * { pointer-events:auto; } */
   .nav-actions { display: flex; gap: 10px; align-items: center; justify-content: flex-end;}
    /* .nav-actions { display:flex; gap:10px; align-items:center; justify-content:flex-end; } */
    button, .back { border:0; border-radius:999px; background:white; color:var(--purple); padding:12px 18px; font-weight:900; text-decoration:none; cursor:pointer; box-shadow:0 8px 28px rgba(0,0,0,.12); }
    .counter { background:rgba(0,0,0,.22); padding:10px 16px; border-radius:999px; justify-self:center; }
    @media (max-width:700px){
      body{overflow:auto;overscroll-behavior:contain;background:linear-gradient(160deg,#6c5ce7,#00b4d8);}
      .deck{width:100%;height:auto;min-height:100svh;padding:12px 12px 78px;align-items:center;}
      .slide{width:calc(100vw - 24px);min-height:calc(100svh - 90px);max-height:none;padding:22px 18px;border-radius:22px;box-shadow:0 16px 45px rgba(0,0,0,.22);overflow:hidden;}
      .slide.active{justify-content:flex-start;}
      .slide-content{min-height:calc(100svh - 154px);max-height:none;overflow:visible;padding-left:0;scrollbar-gutter:auto;display:flex;flex-direction:column;}
      .kicker{font-size:.95rem;margin-bottom:8px;}
      h1{font-size:clamp(2rem,12vw,3.1rem);line-height:1.05;margin-bottom:12px;}
      h2{font-size:clamp(1.65rem,9vw,2.45rem);line-height:1.12;margin-bottom:16px;}
      p,li{font-size:clamp(1rem,4.8vw,1.25rem);line-height:1.45;}
      ul{padding-right:1.15em;}
      .time-badge{font-size:1rem;padding:7px 12px;margin-bottom:10px;}
      .two-cols,.cards{grid-template-columns:1fr;gap:10px;}
      .card{padding:40px 28px;min-height:260px;font-size:1.05rem;border-radius:18px;}
      .slide-content > p{padding:44px 30px;min-height:65vh;border-radius:20px;margin:14px 0;}
      .teacher-box,.teacher-note,.blockly-solution{padding:30px 22px;border-radius:22px;margin:16px 0;min-height:260px;max-height:70svh;overflow-y:auto;}
      .teacher-box h3{font-size:1.05rem;}
      .exercise-kind{font-size:.95rem;padding:7px 11px;line-height:1.25;}
      .emoji{font-size:4rem;margin-bottom:10px;}
      .visual-block{width:100%;max-width:100%;font-size:.86rem;padding:10px 14px;white-space:normal;word-break:break-word;}
      .visual-block.nested{margin-right:24px;width:calc(100% - 24px);}
      .visual-block.if-block{min-width:0;}
      .visual-block.connector{margin:-4px 54px -2px auto;width:18px;height:12px;}
      .nav{position:fixed;inset:auto 10px max(8px,env(safe-area-inset-bottom)) 10px;display:flex;justify-content:space-between;gap:8px;background:rgba(35,35,65,.58);backdrop-filter:blur(12px);padding:8px;border-radius:999px;z-index:20;}
      .counter{display:none;}
      .nav-actions{gap:6px;}
      button,.back{padding:10px 12px;font-size:.92rem;box-shadow:0 6px 18px rgba(0,0,0,.15);}
    }
    @media (max-width:420px){
      .deck{padding-inline:8px;}
      .slide{padding:18px 13px;border-radius:18px;}
      button,.back{padding:9px 10px;font-size:.84rem;}
      .nav-actions{gap:4px;}
    }
    @media (max-height:520px) and (orientation:landscape){
      .deck{padding-bottom:74px;}
      .slide{min-height:calc(100svh - 90px);}
      .emoji{font-size:3rem;}
      .nav{padding:5px 8px;}
      button,.back{padding:7px 10px;}
    }
  </style>
</head>
<body>
  <main class="deck" id="deck"></main>
  <nav class="nav">
    <button onclick="prevSlide()">→ הקודם</button>
    <span class="counter" id="counter"></span>
    <div class="nav-actions">
      <button onclick="nextSlide()">הבא ←</button>
      <a class="back" id="backToLesson" href="../smart-city.html">🏙️ לעיר</a>
    </div>
  </nav>

  <script src="../js/lessons-data.js?v=20260716-miriam-story-v37"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const lesson = window.getSensiLesson(params.get('id'));
    let current = 0;

    document.title = `${lesson.emoji} שיעור ${lesson.id}: ${lesson.title}`;
    document.getElementById('backToLesson').href = `../index.html?lesson=${lesson.id}`;

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, (char) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[char]));
    }

    function normalizeBlockLabel(text) {
      return String(text || '')
        .replace(/^בתוך ה[”"]?אם[”"]?:\s*/,'')
        .replace(/^בתוך ה[”"]?אם[”"]?,\s*/,'')
        .replace(/^מתחת ל[^:]+:\s*/,'')
        .replace(/^אחרי התנאי הראשון:\s*/,'')
        .replace(/^מתחת לפנס, עדיין בתוך ה[”"]?אם[”"]?:\s*/,'')
        .replace(/^מתחת להודעה, עדיין בתוך ה[”"]?אם[”"]?:\s*/,'')
        .replace(/^מתחת ל“עצור רכב”, עדיין בתוך ה[”"]?אם[”"]?:\s*/,'')
        .replace(/^עדיין בתוך ה[”"]?אם[”"]?:\s*/,'')
        .trim();
    }

    function blockClass(text) {
      const label = normalizeBlockLabel(text);
      if (/כאשר|לוחצים/.test(label)) return 'event';
      if (/^אם/.test(label)) return 'control if-block';
      if (/חיישן|מריח|נוגע|עוצמת|רעש|אור/.test(label) && !/^אם/.test(label)) return 'sensor';
      if (/זוז|סובב|רכב|אחורה|קדימה/.test(label)) return 'motion';
      if (/עצור תוכנית/.test(label)) return 'stop';
      if (/עצור רכב|עצור$/.test(label)) return 'motion';
      if (/השמע|אזעקה|ביפ/.test(label)) return 'sound';
      if (/פנס רחוב/.test(label)) return 'street-light';
      if (/אמור|הודעה/.test(label)) return 'say';
      return 'action';
    }

    function isNestedAnswerLine(text) {
      return /^בתוך|^מתחת|^עדיין/.test(String(text || '').trim());
    }

    function renderVisualBlock(text) {
      const label = normalizeBlockLabel(text);
      const cls = blockClass(text);
      if (/^אם\s+/.test(label)) {
        const condition = label.replace(/^אם\s+/, '').trim();
        return `<div class="visual-block ${cls}">אם <span class="condition-pill">${escapeHtml(condition)}</span> אז</div>`;
      }
      return `<div class="visual-block ${cls}${isNestedAnswerLine(text) ? ' nested' : ''}">${escapeHtml(label)}</div>`;
    }

    function renderSolutionBlocks(answerBlocks) {
      const blocks = answerBlocks || [];
      const showConnectors = Number(lesson.id) !== 12;
      const html = blocks.map((block, index) => {
        const current = renderVisualBlock(block);
        const next = blocks[index + 1];
        const connector = showConnectors && next ? `<div class="visual-block connector ${isNestedAnswerLine(next) ? 'nested' : ''}"></div>` : '';
        return current + connector;
      }).join('');
      return `<div class="blockly-solution"><div class="blockly-caption">כך הפתרון נראה בבלוקים:</div><div class="code-blocks">${html}</div></div>`;
    }

    function exerciseSlidesForStep(step) {
      const exercises = (lesson.programmingExercises || []).filter((exercise) => exercise.afterFlowMinutes === step.minutes);
      return exercises.flatMap((exercise) => {
        const exerciseNumber = (lesson.programmingExercises || []).indexOf(exercise) + 1;
        return [
          { html: `<span class="time-badge">${step.minutes}</span><div class="exercise-kind">🧩 תרגול תכנות ${exerciseNumber} — עכשיו בכיתה</div><h2>${exercise.title}</h2><p>${exercise.studentPrompt}</p><div class="teacher-box"><h3>מה לבקש מהתלמידים עכשיו</h3><ul>${(exercise.testSteps || []).map(testStep => `<li>${testStep}</li>`).join('')}</ul></div><div class="teacher-note"><strong>למדריך:</strong> השקף הזה מגיע מיד אחרי חלק “${step.title}”, כדי שהתרגול יופיע בדיוק בזמן הנכון ברצף השיעור.</div>` },
          { html: `<span class="time-badge">${step.minutes}</span><div class="exercise-kind">✅ פתרון למדריך — תרגול ${exerciseNumber}</div><h2>${exercise.answerTitle}</h2>${renderSolutionBlocks(exercise.answerBlocks)}<p><strong>תוצאה מצופה:</strong> ${exercise.expectedResult}</p><p><strong>טעות נפוצה:</strong> ${exercise.commonMistake}</p>` }
        ];
      });
    }

    const flowSlides = (lesson.sixtyMinuteFlow || []).flatMap((step) => [
      { html: `
        <span class="time-badge">${step.minutes}</span>
        <h2>${step.title}</h2>
        ${step.teacherSays ? `<div class="teacher-box"><h3>מה להגיד</h3><p>${step.teacherSays}</p></div>` : ''}
        <div class="two-cols">
          <div class="teacher-box"><h3>מה המדריך עושה</h3><ul>${(step.teacherDoes || step.tasks || []).map(task => `<li>${task}</li>`).join('')}</ul></div>
          <div class="teacher-box"><h3>מה התלמידים עושים</h3><ul>${(step.studentTasks || step.tasks || []).map(task => `<li>${task}</li>`).join('')}</ul></div>
        </div>
        ${step.checkQuestion ? `<p><strong>שאלת בדיקה:</strong> ${step.checkQuestion}</p>` : ''}
      ` },
      ...exerciseSlidesForStep(step)
    ]);

    const introSlides = Number(lesson.id) === 14 ? [
      { html: `<div class="emoji">🛟</div><div class="kicker">שיעור 14 • זירת חילוץ</div><h1>סיפור חילוץ — הנתיב הבטוח</h1><p>קריאת חירום מגיעה מהמגדל: יש חום מסוכן, עשן וחסם במסלול. סנסי צריך לזהות את הסכנה, להפעיל עזרה, ורק אז לבחור נתיב בטוח.</p>` },
      { html: `<h2>🎬 עלילת השיעור</h2><div class="cards"><div class="card">🚨 המגדל שולח קריאת חירום</div><div class="card">🔥💨🪨 סנסי בודק סכנות</div><div class="card">🚁🛟 סנסי בוחר נתיב בטוח</div></div>` },
      { html: `<h2>👁️ החיישנים בסיפור</h2><ul><li><strong>חום מסוכן</strong> — לא נכנסים לאזור חם.</li><li><strong>עשן בזירה</strong> — מפעילים אזעקה ומזהירים.</li><li><strong>חסם במסלול</strong> — בוחרים דרך חלופית.</li></ul>` },
      { html: `<h2>🧱 הבלוקים המרכזיים</h2><div class="cards"><div class="card">אם חום מסוכן</div><div class="card">אם עשן בזירה</div><div class="card">אם חסם במסלול</div><div class="card">הפעל אזעקה</div><div class="card">הפעל רחפן חילוץ</div><div class="card">בחר נתיב בטוח</div></div>` },
      { html: `<h2>✅ מה נבנה?</h2><ul><li>רצף חילוץ ברור: קריאה → בדיקת סכנות → פעולה.</li><li>תגובה שונה לכל סכנה.</li><li>בחירת נתיב בטוח לפני תנועה.</li></ul>` }
    ] : [
      { html: `<div class="emoji">${lesson.emoji}</div><div class="kicker">שיעור ${lesson.id} • ${lesson.cityZone}</div><h1>${lesson.title}</h1><p>${lesson.story}</p>` },
      { html: `<h2>🎯 מה נלמד היום?</h2><ul>${lesson.learningGoals.map(goal => `<li>${goal}</li>`).join('')}</ul>` },
      { html: `<h2>🤖 החיישן של היום</h2><p>היום סנסי משתמש ב<strong>חיישן ${lesson.sensorFocus}</strong>.</p><p>${lesson.sensorExplanation || 'החיישן עוזר לרובוט להבין מה קורה סביבו — ואז לבחור פעולה.'}</p>` },
      { html: `<h2>🧩 רעיון תכנותי</h2><p><strong>${lesson.codingConcept}</strong></p><p>במקום לתת לרובוט הוראה אחת קבועה, אנחנו מלמדים אותו לבדוק מצב ולקבל החלטה.</p>` },
      { html: `<h2>🧱 בלוקים שנשתמש בהם</h2><div class="cards">${lesson.blocks.map(block => `<div class="card">${block}</div>`).join('')}</div>` },
      { html: `<h2>✅ מה נבנה עד סוף השיעור?</h2><ul>${lesson.successCriteria.map(item => `<li>${item}</li>`).join('')}</ul>` },
      ...(lesson.instructorQuickTasks ? [{ html: `<h2>🧑🏫 צ׳ק ליסט למדריך</h2><ul>${lesson.instructorQuickTasks.map(task => `<li>${task}</li>`).join('')}</ul>` }] : [])
    ];

    const slides = [
      ...introSlides,
      ...flowSlides,
      { html: Number(lesson.id) === 14
        ? `<h2>💬 שאלת סיכום</h2><p>איזו סכנה סנסי צריך לבדוק קודם — חום, עשן או חסם? למה?</p><p><strong>משפט סיכום:</strong> חיישן סכנה → החלטה → פעולה בטוחה.</p>`
        : `<h2>💬 שאלת סיכום</h2><p>${lesson.teacherNotes.discussionQuestions[0] || 'איפה עוד בעיר אפשר להשתמש ברעיון הזה?'}</p><p><strong>משפט סיכום:</strong> חיישן → תנאי → פעולה.</p>` }
    ];

    document.getElementById('deck').innerHTML = slides.map((slide, index) => `<section class="slide ${index === 0 ? 'active' : ''}"><div class="slide-content">${slide.html}</div></section>`).join('');

    function render() {
      document.querySelectorAll('.slide').forEach((slide, index) => slide.classList.toggle('active', index === current));
      document.getElementById('counter').textContent = `${current + 1} / ${slides.length}`;
    }
    function nextSlide() { current = Math.min(current + 1, slides.length - 1); render(); }
    function prevSlide() { current = Math.max(current - 1, 0); render(); }
    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowLeft' || event.key === ' ') nextSlide();
      if (event.key === 'ArrowRight') prevSlide();
    });
    render();
  </script>
  <script src="../js/feedback-widget.js?v=20260711-feedback"></script>
</body>
</html>
