<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">🏭 סיסי במפעל הצעצועים</title>
  <meta name="description" content="משחק שיעור 9: בוחרים פעולה ומספר חזרות כדי לבנות לולאה במפעל צעצועים." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/factory.css?v=20260717-factory-1">
</head>
<body>
  <main class="shell">
    <header class="play-header">
      <div><div class="kicker" id="page-subtitle">שיעור 9 • לולאות וחזרות</div><h1>🏭 סיסי במפעל הצעצועים</h1></div>
      <nav class="lesson-nav" id="lesson-nav" aria-label="מעבר בין משימות המפעל"></nav>
    </header>

    <section class="mission-card">
      <div class="big-emoji" id="lesson-emoji" aria-hidden="true">🏭</div>
      <div><h2 id="lesson-heading">משימת מפעל</h2><p id="story"></p><span class="goal-chip" id="goal-chip"></span><div class="learning-note" id="learning-note"></div></div>
    </section>

    <section class="factory-layout">
      <div class="option-panel">
        <h2>1. איזו פעולה חוזרת?</h2>
        <p>בחרו את הפעולה שהמפעל צריך לעשות שוב ושוב.</p>
        <div class="option-grid" id="action-options"></div>
      </div>
      <div class="option-panel">
        <h2>2. כמה פעמים לחזור?</h2>
        <p>בחרו מספר חזרות מדויק. מעט מדי או יותר מדי יוצר באג.</p>
        <div class="option-grid" id="count-options"></div>
      </div>
    </section>

    <section class="loop-panel">
      <h2>הלולאה שבניתי</h2>
      <div class="loop-preview" id="loop-preview" aria-live="polite"></div>
      <div class="factory-line" id="factory-line" aria-label="פס ייצור צעצועים"></div>
      <div class="controls">
        <button class="btn" id="check" type="button">▶️ להריץ לולאה</button>
        <button class="btn secondary" id="hint" type="button">💡 רמז</button>
        <button class="btn secondary" id="clear" type="button">🔄 להתחיל מחדש</button>
        <a class="btn secondary" href="factory.html">🏭 עמוד השיעור</a>
      </div>
      <div class="result" id="result" aria-live="polite"></div>
      <div class="next-step" id="next-step"></div>
    </section>
  </main>
  <script src="js/factory-lessons.js?v=20260717-factory-1"></script>
  <script src="js/factory-play.js?v=20260717-factory-lab-1"></script>
  <script src="/js/feedback-widget.js?v=20260714-mobile-offset"></script>
</body>
</html>
