<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧁 משחקים עם סיסי במטבח הקסמים</title>
  <meta name="description" content="משחק מטבח אינטראקטיבי לכיתות ב׳: מסדרים שלבי מתכון ולומדים אלגוריתמים וסדר פעולות." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/kitchen.css?v=20260717-kitchen-1">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <div class="kicker">שיעור 5 • מטבח ואלגוריתמים • סדר פעולות</div>
        <h1 id="page-title">🧁 טוען מתכון...</h1>
        <p id="page-subtitle">בחרו שלבים לפי הסדר הנכון. מתכון טוב הוא אלגוריתם ברור.</p>
        <div class="actions">
          <a class="btn secondary" href="kitchen.html">🍪 כל המתכונים</a>
          <a class="btn secondary" href="sisi.html">🤖 כל שיעורי סיסי</a>
        </div>
      </div>
      <div class="hero-art" aria-hidden="true">🤖👩‍🍳</div>
    </section>

    <section class="kitchen-stage">
      <div class="lesson-title">
        <div>
          <h2 id="lesson-heading"></h2>
          <div class="mission" id="mission"></div>
        </div>
        <div class="emoji" id="lesson-emoji"></div>
      </div>

      <div class="recipe-goal" id="cooking-note"></div>
      <div class="timer-box"><span id="goal"></span><span>טיפ: אפשר למחוק שלב ולנסות שוב</span></div>

      <div class="recipe-layout">
        <section class="pantry">
          <h3>1. שלבי המתכון</h3>
          <div class="step-bank" id="step-bank"></div>
        </section>
        <section class="recipe">
          <h3>2. המתכון שלי</h3>
          <div class="recipe-steps" id="recipe-steps" aria-live="polite"></div>
        </section>
      </div>

      <div class="music-controls">
        <button class="btn" id="check">✅ בדיקת מתכון</button>
        <button class="btn secondary" id="undo">↩️ מחיקה</button>
        <button class="btn secondary" id="clear">🧹 ניקוי</button>
        <button class="btn secondary" id="demo">💡 סדר לדוגמה</button>
      </div>

      <p class="result" id="result" aria-live="polite"></p>
      <h3>מעבר מתכון</h3>
      <div class="kitchen-nav" id="lesson-nav"></div>
    </section>
  </main>

  <script src="js/kitchen-lessons.js?v=20260717-kitchen-1"></script>
  <script src="js/kitchen-play.js?v=20260717-kitchen-1"></script>
  <script src="/js/feedback-widget.js?v=20260714-mobile-offset"></script>
</body>
</html>
