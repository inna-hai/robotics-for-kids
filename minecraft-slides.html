<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מצגת מיינקראפט קידס</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--green:#2f8f2f;--blue:#2a85c7;--gold:#ffd166;--dark:#173018;--paper:rgba(255,255,255,.96)}*{box-sizing:border-box}body{margin:0;font-family:Rubik,Arial,sans-serif;direction:rtl;color:var(--dark);background:linear-gradient(135deg,#55b947,#83d8ff 55%,#b58cff);min-height:100vh;overflow:hidden}.deck{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;padding:30px}.slide{display:none;width:min(1080px,100%);min-height:min(660px,calc(100vh - 120px));background:var(--paper);border-radius:32px;padding:42px;box-shadow:0 25px 70px rgba(0,0,0,.24);position:relative;overflow:hidden}.slide.active{display:flex;flex-direction:column;justify-content:center}.kicker{font-weight:900;color:var(--green);margin-bottom:10px}.emoji{font-size:5.5rem;margin-bottom:12px}h1{font-size:clamp(2.3rem,6vw,4.8rem);line-height:1.05;margin:0 0 16px}h2{font-size:clamp(2rem,5vw,3.6rem);line-height:1.1;margin:0 0 20px}p,li{font-size:clamp(1.12rem,2vw,1.55rem);line-height:1.55}.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.card{background:#f8fafc;border-radius:18px;padding:16px;border-right:7px solid var(--green)}.card b{display:block;color:var(--green);margin-bottom:6px}.flow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.flow .card{font-size:.95rem}.blocks{display:grid;gap:8px;margin-top:12px}.block{width:max-content;max-width:95%;background:#4c97ff;color:white;border-radius:14px;padding:11px 18px;font-weight:900;font-size:clamp(1rem,1.7vw,1.25rem);box-shadow:0 5px 0 rgba(0,0,0,.16);margin:0 0 2px auto}.block.event{background:#ffab19;color:#263238}.block.motion{background:#4c97ff}.block.build{background:#40bf4a}.block.say{background:#9966ff}.block.condition{background:#ff8c1a;color:#263238}.block.reward{background:#f59e0b;color:#263238}.solution{background:#f8fafc;border:3px dashed #bfdbfe;border-radius:20px;padding:14px;margin-top:12px;max-height:330px;overflow:auto}.note{background:#fff7ed;border-right:7px solid #fb923c;border-radius:18px;padding:14px;margin-top:12px}.nav{position:fixed;inset:auto 24px 24px 24px;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;color:white;font-weight:900;pointer-events:none}.nav>*{pointer-events:auto}.nav-actions{display:flex;gap:10px}button,.back{border:0;border-radius:999px;background:white;color:var(--green);padding:12px 18px;font-weight:900;text-decoration:none;cursor:pointer;box-shadow:0 8px 28px rgba(0,0,0,.12)}.counter{background:rgba(0,0,0,.25);padding:10px 16px;border-radius:999px;justify-self:center}@media(max-width:700px){body{overflow:auto}.deck{height:auto;min-height:100svh;padding:12px 10px 88px}.slide{min-height:calc(100svh - 105px);padding:22px 16px;border-radius:22px}.slide.active{justify-content:flex-start}.emoji{font-size:3.5rem}h1{font-size:2.2rem}h2{font-size:1.75rem}.cards,.flow{grid-template-columns:1fr}p,li{font-size:1.05rem}.nav{position:fixed;inset:auto 10px 10px 10px;display:flex;justify-content:space-between;background:rgba(23,48,24,.55);backdrop-filter:blur(12px);border-radius:999px;padding:8px}.counter{display:none}button,.back{padding:9px 11px;font-size:.88rem}.nav-actions{gap:5px}.solution{max-height:none}.block{width:100%;font-size:.95rem}}
  </style>
</head>
<body>
  <main class="deck" id="deck"></main>
  <nav class="nav">
    <button onclick="prevSlide()">→ הקודם</button>
    <span class="counter" id="counter"></span>
    <div class="nav-actions"><button onclick="nextSlide()">הבא ←</button><a class="back" id="playLink" href="minecraft-play.html">🧩 לתרגול</a><a class="back" href="minecraft.html">⛏️ למסלול</a></div>
  </nav>
  <script src="js/minecraft-lessons.js?v=20260710-minecraft-patterns"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const lesson = window.getMinecraftLesson(params.get('lesson'));
    let current = 0;
    document.title = `${lesson.emoji} מצגת שיעור ${lesson.id}: ${lesson.title}`;
    document.getElementById('playLink').href = `minecraft-play.html?lesson=${lesson.id}`;
    const esc = (v) => String(v || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    function cls(text){ if(/כאשר/.test(text)) return 'event'; if(/זוז|עלה|רד|טלפורט/.test(text)) return 'motion'; if(/הנח|בנה|גשם|מזג/.test(text)) return 'build'; if(/אמור|הצג/.test(text)) return 'say'; if(/אם|תנאי|בתוך/.test(text)) return 'condition'; if(/אוצר|חיית|מפלצת|איסוף/.test(text)) return 'reward'; return ''; }
    function renderBlocks(blocks){ return `<div class="solution"><div class="kicker">פתרון בבלוקים</div><div class="blocks">${blocks.map(b => `<div class="block ${cls(b)}">${esc(b)}</div>`).join('')}</div></div>`; }
    const exerciseSlides = (lesson.programmingExercises || []).flatMap((ex) => [
      { html:`<div class="kicker">${ex.minutes} • תרגול מעשי ${ex.number}</div><h2>${esc(ex.title)}</h2><p>${esc(ex.studentPrompt)}</p><div class="note"><b>בדיקה בכיתה:</b><ul>${(ex.testSteps||[]).map(s=>`<li>${esc(s)}</li>`).join('')}</ul></div>` },
      { html:`<div class="kicker">פתרון למדריך • תרגול ${ex.number}</div><h2>${esc(ex.title)}</h2>${renderBlocks(ex.answerBlocks||[])}<p><b>תוצאה מצופה:</b> ${esc(ex.expectedResult)}</p><div class="note"><b>טעות נפוצה:</b> ${esc(ex.commonMistake)}</div>` }
    ]);
    const slides = [
      { html:`<div class="emoji">${lesson.emoji}</div><div class="kicker">מיינקראפט קידס • שיעור ${lesson.id} • ${lesson.durationMinutes} דקות</div><h1>${esc(lesson.title)}</h1><p>${esc(lesson.story)}</p>` },
      { html:`<h2>🎯 מטרת השיעור</h2><p>${esc(lesson.goal)}</p><div class="cards"><div class="card"><b>רעיון תכנותי</b>${esc(lesson.concept)}</div><div class="card"><b>אתגר מסכם</b>${esc(lesson.challenge)}</div></div>` },
      { html:`<h2>🧱 הבלוקים של היום</h2><div class="cards">${lesson.blocks.filter((b,i,a)=>a.indexOf(b)===i).map(b=>`<div class="card"><b>${esc(b)}</b>${esc(blockLabel(b))}</div>`).join('')}</div>` },
      { html:`<h2>⏱️ מהלך שיעור 60 דקות</h2><div class="flow">${(lesson.lessonFlow||[]).map(step=>`<div class="card"><b>${step.minutes} — ${esc(step.title)}</b>${esc(step.teacher)}<br><em>${esc(step.students)}</em></div>`).join('')}</div>` },
      { html:`<h2>🧪 רצף התרגולים</h2><ul>${(lesson.programmingExercises||[]).map(ex=>`<li><b>${ex.minutes}:</b> ${esc(ex.title)}</li>`).join('')}</ul>` },
      ...exerciseSlides,
      { html:`<h2>🏁 סיכום והצגה</h2><p><b>התלמידים צריכים להצליח להגיד:</b></p><p>“כשלחצתי הרצה, סטיב עשה פעולה קטנה, ואז עוד פעולה, ובגלל הסדר יצאה התוצאה.”</p><div class="note">${esc(lesson.success)}</div>` }
    ];
    function blockLabel(type){ const labels={event_start:'התחלה',say:'דיבור',move_up:'תנועה',move_down:'תנועה',move_right:'תנועה',move_left:'תנועה',place_block:'בנייה ידנית',build_tower:'בנייה מהירה',rain_blocks:'אפקט צבעוני',magic_trail:'שביל',teleport:'מיקום',spawn_pet:'חיה',set_day:'זמן',set_night:'זמן',weather_sun:'מזג אוויר',weather_rain:'מזג אוויר',weather_snow:'מזג אוויר',if_on_diamond:'תנאי',open_door:'פעולה',give_treasure:'פרס',start_collect_game:'משחק',build_maze:'מבוך',show_hint:'רמז',spawn_funny_mob:'דמות'}; return labels[type]||type; }
    document.getElementById('deck').innerHTML = slides.map((s,i)=>`<section class="slide ${i===0?'active':''}">${s.html}</section>`).join('');
    function render(){ document.querySelectorAll('.slide').forEach((s,i)=>s.classList.toggle('active',i===current)); document.getElementById('counter').textContent = `${current+1} / ${slides.length}`; }
    function nextSlide(){ current=Math.min(current+1,slides.length-1); render(); }
    function prevSlide(){ current=Math.max(current-1,0); render(); }
    document.addEventListener('keydown', e => { if(e.key==='ArrowLeft'||e.key===' ') nextSlide(); if(e.key==='ArrowRight') prevSlide(); });
    render();
  </script>
</body>
</html>
