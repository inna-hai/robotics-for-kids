<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>מצגת מדריך — AppForge</title><link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}body{margin:0;font-family:Rubik,Arial,sans-serif;direction:rtl;color:#0f172a;background:linear-gradient(135deg,#07111f,#172554 55%,#581c87);min-height:100vh;overflow:hidden}.deck{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;padding:30px}.slide{display:none;width:min(1120px,100%);min-height:min(690px,calc(100vh - 120px));background:rgba(255,255,255,.97);border-radius:34px;padding:42px;box-shadow:0 28px 80px rgba(0,0,0,.32);overflow:auto}.slide.active{display:flex;flex-direction:column;justify-content:center}.kicker{font-weight:900;color:#7c3aed;margin-bottom:10px}h1{font-size:clamp(2.4rem,6vw,4.5rem);line-height:1.05;margin:0 0 16px}h2{font-size:clamp(2rem,5vw,3.4rem);line-height:1.1;margin:0 0 20px}p,li{font-size:clamp(1.08rem,1.8vw,1.35rem);line-height:1.58}.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.card{background:#f8fafc;border-radius:18px;padding:16px;border-right:7px solid #7c3aed}.card b{display:block;color:#1d4ed8}.note{background:#eef2ff;border-right:7px solid #67e8f9;border-radius:18px;padding:14px;margin-top:12px}.nav{position:fixed;inset:auto 24px 24px 24px;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;color:white;font-weight:900;pointer-events:none}.nav>*{pointer-events:auto}button,.back{border:0;border-radius:999px;background:white;color:#3730a3;padding:12px 18px;font-weight:900;text-decoration:none;cursor:pointer}.counter{background:rgba(0,0,0,.25);padding:10px 16px;border-radius:999px;justify-self:center}@media(max-width:760px){body{overflow:auto}.deck{height:auto;min-height:100svh;padding:12px 10px 88px}.slide{min-height:calc(100svh - 105px);padding:22px 16px}.cards{grid-template-columns:1fr}.nav{inset:auto 10px 10px 10px;display:flex;justify-content:space-between}.counter{display:none}}</style></head><body><main class="deck" id="deck"></main><nav class="nav"><button onclick="prevSlide()">→ הקודם</button><span class="counter" id="counter"></span><div><button onclick="nextSlide()">הבא ←</button><a class="back" id="playLink">💻 לתרגול</a><a class="back" href="appforge.html">למסלול</a></div></nav><script src="js/appforge-lessons.js?v=20260718-appforge-1"></script><script>const params=new URLSearchParams(location.search),lesson=window.getAppForgeLesson(params.get('lesson'));let current=0;const esc=v=>String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));document.title=`מצגת מדריך — שיעור ${lesson.id}: ${lesson.title}`;document.getElementById('playLink').href=`appforge-play.html?lesson=${lesson.id}`;const flow=lesson.lessonFlow.map(s=>({html:`<div class="kicker">מהלך שיעור 90 דקות</div><h2>${esc(s.minutes)} — ${esc(s.title)}</h2><div class="cards"><div class="card"><b>מה המדריך עושה</b>${esc(s.teacher)}</div><div class="card"><b>מה הילדים עושים</b>${esc(s.students)}</div></div>`}));const ex=lesson.exercises.map(e=>({html:`<div class="kicker">${esc(e.minutes)} · תרגול</div><h2>${esc(e.title)}</h2><p>${esc(e.prompt)}</p><div class="note"><b>רמז:</b> ${esc(e.hint)}</div>`}));const vocab=lesson.vocabulary.map(v=>`<div class="card"><b>${esc(v[0])}</b>${esc(v[1])}</div>`).join('');const slides=[{html:`<div class="kicker">AppForge Lab • שיעור ${lesson.id}</div><h1>${esc(lesson.title)}</h1><p>${esc(lesson.story)}</p>`},{html:`<h2>🎯 מטרת השיעור</h2><p>${esc(lesson.mission)}</p><div class="cards"><div class="card"><b>יחידה</b>${esc(lesson.unit)}</div><div class="card"><b>מושג מרכזי</b>${esc(lesson.concept)}</div></div>`},{html:`<h2>🧭 רצף ה׳–ו׳</h2><div class="cards"><div class="card"><b>1–5</b>אפליקציות Web אמיתיות</div><div class="card"><b>6–10</b>דאטה, רשימות וזיכרון</div><div class="card"><b>11–20</b>לוגיקה, API מדומה ודשבורדים</div><div class="card"><b>21–30</b>AI, מוצר ופרויקט סיום</div></div>`},{html:`<h2>🧠 מילון קצר</h2><div class="cards">${vocab}</div>`},...flow,{html:`<h2>🧪 רצף תרגולים</h2><ul>${lesson.exercises.map(e=>`<li><b>${esc(e.minutes)}:</b> ${esc(e.title)} — ${esc(e.prompt)}</li>`).join('')}</ul>`},...ex,{html:`<h2>🤖 שימוש נכון ב־AI</h2><div class="cards">${lesson.aiHelper.map(t=>`<div class="card"><b>פרומפט למדריך</b>${esc(t)}</div>`).join('')}</div>`},{html:`<h2>🏁 סיכום</h2><p>כל תלמיד משלים: “האפליקציה שלי פותרת ___, הדאטה שלה הוא ___, ושורת הקוד הכי חשובה היא ___.”</p>`}];document.getElementById('deck').innerHTML=slides.map((s,i)=>`<section class="slide ${i?'':'active'}">${s.html}</section>`).join('');function render(){document.querySelectorAll('.slide').forEach((s,i)=>s.classList.toggle('active',i===current));document.getElementById('counter').textContent=`${current+1} / ${slides.length}`;}function nextSlide(){current=Math.min(current+1,slides.length-1);render()}function prevSlide(){current=Math.max(current-1,0);render()}document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key===' ')nextSlide();if(e.key==='ArrowRight')prevSlide();});render();</script><script src="/js/feedback-widget.js?v=20260711-feedback"></script></body></html>
