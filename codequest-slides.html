<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeQuest — מצגת שיעור</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Rubik,Arial,sans-serif;background:#07111f;color:#f7fbff;min-height:100vh;overflow:hidden}.deck{height:100vh;display:grid;grid-template-rows:auto 1fr auto}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px;background:rgba(255,255,255,.08);border-bottom:1px solid rgba(255,255,255,.14)}.brand{font-weight:900}.brand small{display:block;color:#b7c5de;font-weight:600}.btn{border:0;border-radius:999px;padding:10px 14px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,#5ee7ff,#a78bfa);color:#07111f;text-decoration:none}.btn.secondary{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);color:#f7fbff}.slide{display:none;padding:42px;overflow:auto}.slide.active{display:grid;align-content:center;min-height:0}.card{max-width:1100px;margin:0 auto;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);border-radius:32px;padding:42px;box-shadow:0 24px 80px rgba(0,0,0,.28)}h1{font-size:clamp(2.6rem,6vw,5.6rem);line-height:1.05;margin:0 0 16px}h2{font-size:clamp(2rem,4vw,4rem);margin:0 0 20px}.lead{font-size:1.45rem;line-height:1.8;color:#d6e2f5}.grid{display:grid;grid-template-columns:1fr 1fr;gap:22px}.box{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:22px;padding:22px}.box h3{margin:0 0 10px;color:#5ee7ff;font-size:1.35rem}ul,ol{font-size:1.25rem;line-height:1.9;margin:0;padding-right:28px}.code{direction:ltr;text-align:left;background:#06101e;color:#dcfce7;border-radius:22px;padding:24px;font:1.35rem/1.75 Consolas,'Courier New',monospace;white-space:pre-wrap}.turtle{font-size:7rem;text-align:center;filter:drop-shadow(0 12px 18px rgba(0,0,0,.32))}.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:rgba(255,255,255,.08);border-top:1px solid rgba(255,255,255,.14)}.count{font-weight:900;color:#b7c5de}@media(max-width:800px){body{overflow:auto}.deck{height:auto;min-height:100vh}.slide{padding:16px}.card{padding:24px}.grid{grid-template-columns:1fr}.nav{position:sticky;bottom:0}.code{font-size:1rem}}
  </style>
</head>
<body>
  <div class="deck">
    <header class="top">
      <div class="brand">🐍 CodeQuest — מצגת שיעור <span id="lessonNum"></span><small id="lessonName"></small></div>
      <div><a class="btn secondary" id="playLink" href="codequest-play.html?lesson=1">פתיחת הלומדה</a></div>
    </header>

    <main id="slides"></main>

    <footer class="nav">
      <button class="btn secondary" onclick="prevSlide()">→ קודם</button>
      <div class="count" id="counter"></div>
      <button class="btn" onclick="nextSlide()">הבא ←</button>
    </footer>
  </div>

  <script src="js/codequest-lessons.js?v=slides-exercises-1"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const lessonId = Number(params.get('lesson') || 1);
    const lesson = window.CODEQUEST_LESSONS.find(l => l.id === lessonId) || window.CODEQUEST_LESSONS[0];
    let active = 0;
    document.title = `CodeQuest — מצגת שיעור ${lesson.id}`;
    document.getElementById('lessonNum').textContent = lesson.id;
    document.getElementById('lessonName').textContent = lesson.title;
    document.getElementById('playLink').href = `codequest-play.html?lesson=${lesson.id}&v=slides-exercises-1`;

    const code = lesson.starterCode || '# בקרוב';
    const exercises = window.getCodeQuestExercises ? window.getCodeQuestExercises(lesson) : (lesson.exercises || []);
    const slides = [
      `<section class="slide"><div class="card"><div class="turtle">🐢</div><h1>שיעור ${lesson.id}: ${lesson.title}</h1><p class="lead">${lesson.story}</p></div></section>`,
      `<section class="slide"><div class="card"><h2>האתגר היום</h2><p class="lead">${lesson.challenge}</p><div class="box"><h3>שאלת פתיחה</h3><p class="lead">מה לדעתכם יקרה כשנריץ את הקוד?</p></div></div></section>`,
      `<section class="slide"><div class="card"><h2>מה נלמד?</h2><ul>${(lesson.goals||[]).map(g=>`<li>${g}</li>`).join('')}</ul></div></section>`,
      `<section class="slide"><div class="card"><h2>קוד פתיחה</h2><pre class="code">${code.replace(/</g,'&lt;')}</pre></div></section>`,
      `<section class="slide"><div class="card"><h2>פירוק לפעולות קטנות</h2><div class="grid"><div class="box"><h3>1. צבע</h3><p class="lead">בוחרים צבע לציור.</p></div><div class="box"><h3>2. תנועה</h3><p class="lead">הצב מתקדם ומצייר קו.</p></div><div class="box"><h3>3. פנייה</h3><p class="lead">הכיוון משתנה, לא המיקום.</p></div><div class="box"><h3>4. בדיקה</h3><p class="lead">מריצים, מסתכלים, מתקנים.</p></div></div></div></section>`,
      `<section class="slide"><div class="card"><h2>תרגילים לשיעור</h2><ol>${exercises.map(ex => `<li>${ex}</li>`).join('')}</ol></div></section>`,
      `<section class="slide"><div class="card"><h2>דיבאג</h2><ul><li>אם הצב לא זז — בדקו סוגריים.</li><li>אם אין צבע — בדקו מרכאות.</li><li>אם הכיוון מפתיע — בדקו איפה כתבתם right או left.</li><li>אם הקו קצר/ארוך מדי — שנו את המספר ב־forward.</li></ul></div></section>`,
      `<section class="slide"><div class="card"><h2>סיכום</h2><p class="lead">היום כתבנו קוד פייתון כמעט אמיתי שמזיז צב ומצייר על דף. בשיעור הבא נבנה ציורים ודפוסים מורכבים יותר.</p></div></section>`
    ];
    document.getElementById('slides').innerHTML = slides.join('');
    const els = [...document.querySelectorAll('.slide')];
    function render(){ els.forEach((el,i)=>el.classList.toggle('active', i===active)); document.getElementById('counter').textContent = `${active+1} / ${els.length}`; }
    function nextSlide(){ active = Math.min(els.length-1, active+1); render(); }
    function prevSlide(){ active = Math.max(0, active-1); render(); }
    document.addEventListener('keydown', e => { if(e.key==='ArrowLeft') nextSlide(); if(e.key==='ArrowRight') prevSlide(); });
    render();
  </script>
</body>
</html>
