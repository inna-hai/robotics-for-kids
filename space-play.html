<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 שיעור חלל - משחקים עם סיסי בחלל</title>
  <meta name="description" content="שיעור חלל אינטראקטיבי עם סיסי: בוחרים פקודות, מריצים מסלול ולומדים עובדת חלל." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/space.css?v=20260717-space-lesson-label">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <div class="kicker">שיעור חלל • סיסי בחלל • משימת תכנות קצרה</div>
        <h1 id="page-title">🚀 טוען משימה...</h1>
        <p id="page-subtitle">שיעור חלל אינטראקטיבי: בחרו פקודות, הריצו, ואם לא הצליח — משנים ומנסים שוב.</p>
        <div class="actions">
          <a class="btn secondary" href="space.html">🪐 כל המשימות</a>
          <a class="btn secondary" href="smart-city.html">🏙️ לעיר החכמה</a>
        </div>
      </div>
      <div class="hero-art" aria-hidden="true">🤖✨</div>
    </section>

    <section class="play-layout">
      <div class="game-card">
        <div class="lesson-title">
          <div>
            <h2 id="lesson-heading"></h2>
            <div class="mission" id="mission"></div>
          </div>
          <div class="emoji" id="lesson-emoji"></div>
        </div>
        <div class="fact" id="fact"></div>
        <div class="grid" id="grid" aria-label="לוח משחק של שיעור חלל"></div>
      </div>

      <aside class="side-card">
        <h2>הפקודות שלי</h2>
        <p class="small">לחצו על פקודות כדי לבנות מסלול. המטרה: להגיע לכוכב הירוק. אפשר גם ללחוץ “פתרון לדוגמה”.</p>
        <div class="controls">
          <button class="control" data-cmd="up">⬆️ למעלה</button>
          <button class="control" data-cmd="down">⬇️ למטה</button>
          <button class="control" data-cmd="right">➡️ ימינה</button>
          <button class="control" data-cmd="left">⬅️ שמאלה</button>
        </div>
        <div class="program" id="program" aria-live="polite"></div>
        <div class="side-actions">
          <button class="btn" id="run">🚀 הרצה</button>
          <button class="btn secondary" id="undo">↩️ מחיקה</button>
          <button class="btn secondary" id="clear">🧹 ניקוי</button>
          <button class="btn secondary" id="demo">💡 פתרון לדוגמה</button>
        </div>
        <p class="result" id="result" aria-live="polite"></p>
        <h3>מעבר משימה</h3>
        <div class="nav-lessons" id="lesson-nav"></div>
      </aside>
    </section>
  </main>

  <script src="js/space-lessons.js?v=20260717-space-1"></script>
  <script src="js/space-play.js?v=20260717-space-1"></script>
  <script src="/js/feedback-widget.js?v=20260714-mobile-offset"></script>
</body>
</html>
